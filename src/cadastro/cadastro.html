<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Best Filmes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Yuyu+Short&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="cadastro.css">
</head>

<body>

    <div class="topbar">
        <img src="../../imagens/acao.png" class="ticket-icon">
        <div class="tagline">COMPRE SEUS INGRESSOS AQUI!</div>
        <div class="spacer"></div>
        <p id="www"> www.bestfilmes.com</p>

    </div>



    <main>
        <div class="telalogin">

            <h1>Crie sua conta</h1>
            <p class="subtext">
                Cadastre-se e garanta seus ingressos com facilidade. Acompanhe estreias,
                acumule vantagens e nunca perca os melhores filmes em cartaz.
            </p>

            <form>
                <div>
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" class="entrada" placeholder="Digite seu nome completo" required>
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="entrada" placeholder="seuemail@exemplo.com" required>
                </div>

                <div>
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" class="entrada" placeholder="(00) 00000-0000">
                </div>

                <div>
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" class="entrada" placeholder="Crie uma senha" required>
                </div>

                <div>
                    <label for="confirmar">Confirmar senha</label>
                    <input type="password" id="confirmar" class="entrada" placeholder="Repita a senha" required>
                </div>

                <div class="row">
                    <input type="checkbox" id="termos" required>
                    <label for="termos" style="text-transform:none; font-weight:400; margin:0;">
                        Aceito os termos de uso e a política de privacidade
                    </label>
                </div>

                <button type="submit" class="submit-btn">Cadastrar</button>
            </form>

            <div class="login-link">
                <a href="" class="caminho1">☐ Esqueci a senha</a>
            </div>
        </div>
    </main>

</body>

</html>
