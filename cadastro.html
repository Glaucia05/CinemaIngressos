            <input type="text" id="nome" name="nome" onmouseover="PorCima2(this)" onmouseout="PorFora2(this)" required>

        <br>

        <div class="for-group">
            <label for="telefone">Telefone:</label>
            <input  type="tel" id="telefone" name="telefone" onmouseover="PorCima2(this)" onmouseout="PorFora2(this)"  required >
              </div>

            
      

        <br>

        <button type="submit" name="submit" onmouseover="porCima(this)" onmouseout="porFora(this)">Cadastrar</button>
       
    </form>
