<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestFilmesCadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <img src="imagens/fita.png" id="imagem">
    <h1 id="cadastroNome">Cadastro de Usuário</h1>

    <div id= "bordadireita"></div>
    <div id= "bordaesquerda"></div>
    
    <form id="caixacadastro" action="/processar_cadastro" method="POST">
        
        <div class="for-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <br> <div class="for-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <br>

        <div class="for-group">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" minlength="6">
        </div>

        <br>

        <div class="for-group">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" required>
        </div>

        <br>

        <button type="submit">Cadastrar</button>

    </form>

</body>
</html>
